name: Youtube Shorts Bot

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

jobs:
  generate_shorts:
    runs-on: ubuntu-latest

    steps:

      # Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # Install dependencies
      - name: Install dependencies
        run: pip install -r requirements.txt

      # Create credentials file
      - name: Setup YouTube credentials
        run: |
          echo '${{ secrets.YOUTUBE_CLIENT_SECRET }}' > client_secret.json

      # Run the bot
      - name: Run Youtube Shorts Bot
        run: python scripts/run_bot.py
